<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HeritageDB — Reset Password</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0e1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      position: relative;
    }
    .bg-orb {
      position: absolute; border-radius: 50%;
      filter: blur(100px); opacity: 0.13;
      animation: drift 10s ease-in-out infinite;
    }
    .bg-orb-1 { width: 600px; height: 600px; background: #f0a500; top: -200px; left: -150px; }
    .bg-orb-2 { width: 400px; height: 400px; background: #c47d00; bottom: -150px; right: -100px; animation-delay: 5s; }
    @keyframes drift {
      0%, 100% { transform: translate(0,0) scale(1); }
      50%       { transform: translate(20px,30px) scale(1.05); }
    }
    .card {
      position: relative; z-index: 10;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(240,165,0,0.2);
      backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 44px 42px 40px;
      width: 440px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.55);
    }
    .header { text-align: center; margin-bottom: 30px; }
    .header .icon {
      font-size: 2.4rem; display: block; margin-bottom: 10px;
      filter: drop-shadow(0 0 14px rgba(240,165,0,0.55));
    }
    .header h1 { color: #f0a500; font-size: 1.6rem; font-weight: 800; }
    .header p  { color: #555; font-size: 0.78rem; margin-top: 5px; }

    .alert {
      padding: 11px 14px; border-radius: 10px;
      font-size: 0.83rem; margin-bottom: 18px; text-align: center;
    }
    .alert-error {
      background: rgba(220,53,69,0.12);
      border: 1px solid rgba(220,53,69,0.3);
      color: #ff7070;
    }
    .expired-box {
      text-align: center; padding: 20px;
      background: rgba(220,53,69,0.08);
      border: 1px solid rgba(220,53,69,0.2);
      border-radius: 12px; margin-bottom: 20px;
    }
    .expired-box p { color: #ff7070; margin-bottom: 12px; font-size: 0.9rem; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; color: #aaa; font-size: 0.76rem;
      font-weight: 700; margin-bottom: 7px;
      letter-spacing: 0.8px; text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%; padding: 13px 44px 13px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 11px; color: #fff;
      font-size: 0.94rem; outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .input-wrap input:focus {
      border-color: #f0a500;
      background: rgba(240,165,0,0.04);
      box-shadow: 0 0 0 3px rgba(240,165,0,0.1);
    }
    .input-wrap input::placeholder { color: #383838; }
    .eye-btn {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; color: #484848;
      background: none; border: none;
      font-size: 0.95rem; transition: color 0.2s;
    }
    .eye-btn:hover { color: #f0a500; }

    .str-bg {
      background: rgba(255,255,255,0.06);
      border-radius: 4px; height: 4px;
      overflow: hidden; margin-top: 7px;
    }
    .str-bar { height: 4px; border-radius: 4px; width: 0; transition: all 0.35s; }
    .str-lbl { font-size: 0.72rem; color: #555; margin-top: 4px; }

    .btn-main {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #f0a500, #c47d00);
      color: #000; border: none; border-radius: 11px;
      font-size: 1rem; font-weight: 800;
      cursor: pointer; transition: all 0.25s; margin-top: 6px;
    }
    .btn-main:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(240,165,0,0.35);
    }
    .btn-back {
      display: block; text-align: center; margin-top: 20px;
      color: #f0a500; font-size: 0.83rem; text-decoration: none;
    }
    .btn-back:hover { text-decoration: underline; }
    .footer-note {
      text-align: center; margin-top: 24px;
      color: #2a2a2a; font-size: 0.73rem;
    }
    .footer-note span { color: #f0a500; }
  </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="card">

  <div class="header">
    <span class="icon">🔑</span>
    <h1>Reset Password</h1>
    <p>Create a new password for your account</p>
  </div>

  {% if error %}
  <div class="alert alert-error">⚠️ {{ error }}</div>
  {% endif %}

  {% if expired %}
  <div class="expired-box">
    <p>⏰ This reset link has <strong>expired or already been used</strong>.</p>
    <a href="/login" class="btn-main"
       style="display:inline-block;padding:10px 24px;border-radius:8px;
              text-decoration:none;font-weight:700;font-size:0.9rem;">
      Back to Login
    </a>
  </div>

  {% else %}
  <form method="POST"
        action="/reset-password/{{ token }}?role={{ role }}">

    <div class="field">
      <label>New Password</label>
      <div class="input-wrap">
        <input type="password" name="password" id="new-pass"
               placeholder="Enter new password" required
               oninput="checkStrength(this.value)">
        <button type="button" class="eye-btn"
                onclick="toggleEye('new-pass', this)">👁</button>
      </div>
      <div class="str-bg">
        <div class="str-bar" id="str-bar"></div>
      </div>
      <div class="str-lbl" id="str-lbl"></div>
    </div>

    <div class="field">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <input type="password" name="confirm_password" id="conf-pass"
               placeholder="Confirm new password" required>
        <button type="button" class="eye-btn"
                onclick="toggleEye('conf-pass', this)">👁</button>
      </div>
    </div>

    <button type="submit" class="btn-main">🔒 Update Password</button>
  </form>
  {% endif %}

  <a href="/login" class="btn-back">← Back to Sign In</a>

  <p class="footer-note">
    Preserving India's heritage — <span>digitally.</span>
  </p>

</div>

<script>
  function toggleEye(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
  }

  function checkStrength(val) {
    let score = 0;
    if (val.length >= 6)           score++;
    if (val.length >= 10)          score++;
    if (/[A-Z]/.test(val))         score++;
    if (/[0-9]/.test(val))         score++;
    if (/[^A-Za-z0-9]/.test(val))  score++;
    const levels = [
      { c: '#e74c3c', l: 'Very Weak'   },
      { c: '#e67e22', l: 'Weak'        },
      { c: '#f1c40f', l: 'Fair'        },
      { c: '#2ecc71', l: 'Strong'      },
      { c: '#27ae60', l: 'Very Strong' }
    ];
    const lvl = levels[Math.min(score, 4)];
    const bar = document.getElementById('str-bar');
    bar.style.width      = ((score / 5) * 100) + '%';
    bar.style.background = lvl.c;
    const lbl = document.getElementById('str-lbl');
    lbl.textContent = val ? lvl.l : '';
    lbl.style.color = lvl.c;
  }
</script>
</body>
</html>
