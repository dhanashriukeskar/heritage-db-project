{% extends "base.html" %}
{% block content %}

<section class="page-header text-center">
  <div class="container">
    <h1><i class="fas fa-monument me-3"></i>Heritage Sites</h1>
    <p>Discover India's most treasured cultural and historical monuments</p>
  </div>
</section>

<section class="sites-section">
  <div class="container">
    <div class="search-bar-wrapper mb-5">
      <div class="input-group search-group">
        <span class="input-group-text search-icon">
          <i class="fas fa-search"></i>
        </span>
        <input type="text" class="form-control search-input"
          placeholder="Search heritage sites by name or location..."
          id="searchInput" onkeyup="filterSites()">
      </div>
    </div>

    <div class="row g-4" id="sitesGrid">
      {% for site in sites %}
      <div class="col-md-4 site-item">
        <div class="site-card">
          <div class="site-img-wrapper">
            <img src="{{ site[7] if site[7] else 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Taj_Mahal_%28Edited%29.jpeg/400px-Taj_Mahal_%28Edited%29.jpeg' }}"
              class="site-img" alt="{{ site[1] }}"
              onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Taj_Mahal_%28Edited%29.jpeg/400px-Taj_Mahal_%28Edited%29.jpeg'">
            <span class="site-badge">{{ site[4] }}</span>
          </div>
          <div class="site-body">
            <h5 class="site-name">{{ site[1] }}</h5>
            <p class="site-location">
              <i class="fas fa-map-marker-alt me-1"></i>{{ site[5] }}, {{ site[6] }}
            </p>
            <p class="site-desc">{{ site[2][:100] }}...</p>
            <div class="site-footer">
              <a href="/site/{{ site[0] }}" class="btn-site">
                <i class="fas fa-eye me-1"></i>View Details
              </a>
              <span class="site-tag">{{ site[3] }}</span>
            </div>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>

<script>
function filterSites() {
  const input = document.getElementById('searchInput').value.toLowerCase();
  const items = document.querySelectorAll('.site-item');
  items.forEach(item => {
    const text = item.innerText.toLowerCase();
    item.style.display = text.includes(input) ? '' : 'none';
  });
}
</script>
{% endblock %}
