<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HeritageDB — Login</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0e1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.13;
      animation: drift 10s ease-in-out infinite;
    }
    .bg-orb-1 { width: 600px; height: 600px; background: #f0a500; top: -200px; left: -150px; }
    .bg-orb-2 { width: 400px; height: 400px; background: #c47d00; bottom: -150px; right: -100px; animation-delay: 5s; }
    .bg-orb-3 { width: 250px; height: 250px; background: #f0a500; top: 50%; left: 60%; animation-delay: 2.5s; }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(20px, 30px) scale(1.05); }
    }

    .card {
      position: relative; z-index: 10;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(240,165,0,0.2);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 44px 42px 40px;
      width: 450px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.55),
                  inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .header { text-align: center; margin-bottom: 30px; }
    .header .icon {
      font-size: 2.6rem; display: block; margin-bottom: 10px;
      filter: drop-shadow(0 0 14px rgba(240,165,0,0.55));
    }
    .header h1 {
      color: #f0a500; font-size: 1.8rem;
      font-weight: 800; letter-spacing: 0.5px;
    }
    .header p {
      color: #555; font-size: 0.78rem; margin-top: 5px;
      letter-spacing: 1.5px; text-transform: uppercase;
    }

    .sub-tabs {
      display: flex;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .sub-tab {
      flex: 1; padding: 10px; border: none;
      background: transparent; color: #444;
      font-size: 0.87rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .sub-tab.active { color: #f0a500; border-bottom-color: #f0a500; }

    .alert {
      padding: 11px 14px; border-radius: 10px;
      font-size: 0.83rem; margin-bottom: 18px; text-align: center;
    }
    .alert-error {
      background: rgba(220,53,69,0.12);
      border: 1px solid rgba(220,53,69,0.3);
      color: #ff7070;
    }
    .alert-success {
      background: rgba(40,167,69,0.12);
      border: 1px solid rgba(40,167,69,0.3);
      color: #5ccc6c;
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; color: #aaa; font-size: 0.76rem;
      font-weight: 700; margin-bottom: 7px;
      letter-spacing: 0.8px; text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%; padding: 13px 44px 13px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 11px; color: #fff;
      font-size: 0.94rem; outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }
    .input-wrap input:focus {
      border-color: #f0a500;
      background: rgba(240,165,0,0.04);
      box-shadow: 0 0 0 3px rgba(240,165,0,0.1);
    }
    .input-wrap input::placeholder { color: #383838; }
    .eye-btn {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; color: #484848;
      background: none; border: none;
      font-size: 0.95rem; transition: color 0.2s;
    }
    .eye-btn:hover { color: #f0a500; }

    .name-row { display: flex; gap: 12px; }
    .name-row .field { flex: 1; }

    .str-bg {
      background: rgba(255,255,255,0.06);
      border-radius: 4px; height: 4px;
      overflow: hidden; margin-top: 7px;
    }
    .str-bar { height: 4px; border-radius: 4px; width: 0; transition: all 0.35s; }
    .str-lbl { font-size: 0.72rem; color: #555; margin-top: 4px; }

    .forgot { text-align: right; margin: -6px 0 16px; }
    .forgot a {
      color: #f0a500; font-size: 0.79rem;
      text-decoration: none; opacity: 0.8; transition: opacity 0.2s;
    }
    .forgot a:hover { opacity: 1; text-decoration: underline; }

    .btn-main {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #f0a500, #c47d00);
      color: #000; border: none; border-radius: 11px;
      font-size: 1rem; font-weight: 800;
      cursor: pointer; transition: all 0.25s;
      letter-spacing: 0.3px; margin-top: 6px;
    }
    .btn-main:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(240,165,0,0.35);
    }
    .btn-main:active { transform: translateY(0); }

    #forgot-panel { display: none; }
    .back-link {
      display: block; text-align: center; margin-top: 20px;
      color: #f0a500; font-size: 0.83rem;
      text-decoration: none; cursor: pointer;
    }
    .back-link:hover { text-decoration: underline; }

    .footer-note {
      text-align: center; margin-top: 24px;
      color: #2a2a2a; font-size: 0.73rem;
    }
    .footer-note span { color: #f0a500; }
  </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<div class="card">

  <div class="header">
    <span class="icon">🏛️</span>
    <h1>HeritageDB</h1>
    <p>Heritage Management System</p>
  </div>

  {% if error %}
  <div class="alert alert-error">⚠️ {{ error }}</div>
  {% endif %}
  {% if success %}
  <div class="alert alert-success">✅ {{ success }}</div>
  {% endif %}

  <!-- ── MAIN PANEL ── -->
  <div id="main-panel">

    <!-- Sign In / New Account tabs -->
    <div class="sub-tabs">
      <button class="sub-tab active" id="stab-signin"
              onclick="switchSub('signin')">Sign In</button>
      <button class="sub-tab" id="stab-register"
              onclick="switchSub('register')">New Account</button>
    </div>

    <!-- Visitor: Sign In -->
    <form id="form-signin" method="POST" action="/login">
      <input type="hidden" name="action" value="login">

      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <input type="email" name="email"
                 placeholder="you@example.com" required>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" name="password" id="vsi-pass"
                 placeholder="Enter your password" required>
          <button type="button" class="eye-btn"
                  onclick="toggleEye('vsi-pass', this)">👁</button>
        </div>
      </div>

      <div class="forgot">
        <a href="#" onclick="showForgot(); return false;">Forgot password?</a>
      </div>

      <button type="submit" class="btn-main">Sign In →</button>
    </form>

    <!-- Visitor: Register -->
    <form id="form-register" method="POST" action="/login" style="display:none;">
      <input type="hidden" name="action" value="register">

      <div class="name-row">
        <div class="field">
          <label>First Name</label>
          <div class="input-wrap">
            <input type="text" name="firstname" placeholder="Priya" required>
          </div>
        </div>
        <div class="field">
          <label>Last Name</label>
          <div class="input-wrap">
            <input type="text" name="lastname" placeholder="Sharma" required>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <input type="email" name="email"
                 placeholder="you@example.com" required>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" name="password" id="vreg-pass"
                 placeholder="Create a password" required
                 oninput="checkStrength(this.value)">
          <button type="button" class="eye-btn"
                  onclick="toggleEye('vreg-pass', this)">👁</button>
        </div>
        <div class="str-bg">
          <div class="str-bar" id="str-bar"></div>
        </div>
        <div class="str-lbl" id="str-lbl"></div>
      </div>

      <button type="submit" class="btn-main">Create Account →</button>
    </form>

  </div><!-- /main-panel -->

  <!-- ── FORGOT PASSWORD PANEL ── -->
  <div id="forgot-panel">

    <div style="text-align:center; margin-bottom:22px;">
      <span style="font-size:2.2rem;">🔑</span>
      <h2 style="color:#f0a500; font-size:1.2rem;
                 font-weight:800; margin-top:8px;">
        Reset Password
      </h2>
      <p style="color:#555; font-size:0.8rem; margin-top:5px;">
        Enter your registered email — we'll send a reset link.
      </p>
    </div>

    <form method="POST" action="/forgot-password">
      <div class="field">
        <label>Registered Email</label>
        <div class="input-wrap">
          <input type="email" name="email"
                 placeholder="you@example.com" required>
        </div>
      </div>
      <button type="submit" class="btn-main">📧 Send Reset Link</button>
    </form>

    <a class="back-link" onclick="showMain(); return false;">
      ← Back to Sign In
    </a>
  </div><!-- /forgot-panel -->

  <p class="footer-note">
    Preserving India's heritage — <span>digitally.</span>
  </p>

</div><!-- /card -->

<script>
  function switchSub(sub) {
    const isSignin = sub === 'signin';
    document.getElementById('form-signin').style.display
      = isSignin ? 'block' : 'none';
    document.getElementById('form-register').style.display
      = isSignin ? 'none' : 'block';
    document.getElementById('stab-signin')
      .classList.toggle('active', isSignin);
    document.getElementById('stab-register')
      .classList.toggle('active', !isSignin);
  }

  function showForgot() {
    document.getElementById('main-panel').style.display  = 'none';
    document.getElementById('forgot-panel').style.display = 'block';
  }

  function showMain() {
    document.getElementById('main-panel').style.display  = 'block';
    document.getElementById('forgot-panel').style.display = 'none';
  }

  function toggleEye(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
  }

  function checkStrength(val) {
    let score = 0;
    if (val.length >= 6)           score++;
    if (val.length >= 10)          score++;
    if (/[A-Z]/.test(val))         score++;
    if (/[0-9]/.test(val))         score++;
    if (/[^A-Za-z0-9]/.test(val))  score++;
    const levels = [
      { c: '#e74c3c', l: 'Very Weak'   },
      { c: '#e67e22', l: 'Weak'        },
      { c: '#f1c40f', l: 'Fair'        },
      { c: '#2ecc71', l: 'Strong'      },
      { c: '#27ae60', l: 'Very Strong' }
    ];
    const lvl = levels[Math.min(score, 4)];
    const bar = document.getElementById('str-bar');
    bar.style.width      = ((score / 5) * 100) + '%';
    bar.style.background = lvl.c;
    const lbl = document.getElementById('str-lbl');
    lbl.textContent = val ? lvl.l : '';
    lbl.style.color = lvl.c;
  }

  {% if active_tab == 'register' %}
    switchSub('register');
  {% endif %}
</script>
</body>
</html>
