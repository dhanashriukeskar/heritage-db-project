{% extends "base.html" %}
{% block content %}

<section class="page-header text-center">
  <div class="container">
    <h1><i class="fas fa-user-shield me-3"></i>Admin Portal</h1>
    <p>Enter your admin credentials to access the management panel</p>
  </div>
</section>

<section class="sites-section">
  <div class="container" style="max-width:420px">
    <div class="detail-card">

      <div style="text-align:center;margin-bottom:24px;">
        <div style="width:64px;height:64px;background:#f0a500;border-radius:50%;
                    display:inline-flex;align-items:center;justify-content:center;">
          <i class="fas fa-lock" style="font-size:1.6rem;color:#0d0d1a;"></i>
        </div>
        <p style="color:#aaa;margin-top:12px;font-size:0.9rem;">
          This area is restricted to administrators only.
        </p>
      </div>

      {% if error %}
        <div style="background:#ff444422;border:1px solid #ff4444;color:#ff6666;
                    padding:10px 14px;border-radius:8px;margin-bottom:16px;
                    text-align:center;font-size:0.9rem;">
          <i class="fas fa-exclamation-circle me-1"></i>{{ error }}
        </div>
      {% endif %}

      <form method="POST" action="/admin/login">

        <div class="mb-3">
          <label style="color:#f0a500;font-weight:600;font-size:0.9rem;">
            <i class="fas fa-envelope me-1"></i>Admin Email
          </label>
          <input type="email" name="email" class="form-control"
                 style="background:#1a1a2e;border:1px solid #f0a500;color:#fff;
                        margin-top:8px;padding:10px 14px;border-radius:8px;"
                 placeholder="Enter your admin email" required>
        </div>

        <div class="mb-4">
          <label style="color:#f0a500;font-weight:600;font-size:0.9rem;">
            <i class="fas fa-lock me-1"></i>Password
          </label>
          <div style="position:relative;margin-top:8px;">
            <input type="password" name="password" id="adminPassword" class="form-control"
                   style="background:#1a1a2e;border:1px solid #f0a500;color:#fff;
                          padding:10px 42px 10px 14px;border-radius:8px;"
                   placeholder="Enter your password" required>
            <span onclick="togglePassword()"
                  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                         cursor:pointer;color:#f0a500;">
              <i class="fas fa-eye" id="eyeIcon"></i>
            </span>
          </div>
        </div>

        <button type="submit"
                style="width:100%;padding:12px;border-radius:8px;border:none;
                       background:#f0a500;color:#0d0d1a;font-weight:700;
                       font-size:1rem;cursor:pointer;transition:opacity 0.2s;"
                onmouseover="this.style.opacity='0.85'"
                onmouseout="this.style.opacity='1'">
          <i class="fas fa-sign-in-alt me-2"></i>Login as Admin
        </button>

      </form>

      <div style="text-align:center;margin-top:20px;">
        <a href="/" style="color:#aaa;font-size:0.85rem;text-decoration:none;">
          <i class="fas fa-arrow-left me-1"></i>Back to Heritage Sites
        </a>
      </div>

    </div>
  </div>
</section>

<script>
function togglePassword() {
  const input = document.getElementById('adminPassword');
  const icon  = document.getElementById('eyeIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}
</script>

{% endblock %}
