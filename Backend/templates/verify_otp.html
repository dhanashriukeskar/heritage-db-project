<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HeritageDB — Verify OTP</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0e1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(240,165,0,0.2);
      border-radius: 24px;
      padding: 44px 42px 40px;
      width: 420px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.55);
      text-align: center;
    }
    .icon { font-size: 3rem; display: block; margin-bottom: 12px; }
    h1 { color: #f0a500; font-size: 1.6rem; font-weight: 800; }
    p  { color: #666; font-size: 0.85rem; margin-top: 8px; line-height: 1.5; }
    .alert {
      padding: 11px 14px; border-radius: 10px;
      font-size: 0.83rem; margin: 18px 0;
    }
    .alert-error {
      background: rgba(220,53,69,0.12);
      border: 1px solid rgba(220,53,69,0.3);
      color: #ff7070;
    }
    .otp-inputs {
      display: flex; gap: 10px;
      justify-content: center;
      margin: 28px 0;
    }
    .otp-inputs input {
      width: 52px; height: 60px;
      text-align: center;
      font-size: 1.6rem; font-weight: 700;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff; outline: none;
      transition: border-color 0.2s;
    }
    .otp-inputs input:focus {
      border-color: #f0a500;
      background: rgba(240,165,0,0.05);
    }
    .btn-main {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #f0a500, #c47d00);
      color: #000; border: none; border-radius: 11px;
      font-size: 1rem; font-weight: 800;
      cursor: pointer; transition: all 0.25s;
    }
    .btn-main:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(240,165,0,0.35);
    }
    .resend {
      margin-top: 18px; font-size: 0.8rem; color: #555;
    }
    .resend a { color: #f0a500; text-decoration: none; }
    .resend a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <span class="icon">📧</span>
  <h1>Verify Your Email</h1>
  <p>We sent a 6-digit OTP to your email address.<br>Enter it below to activate your account.</p>

  {% if error %}
  <div class="alert alert-error">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/verify-otp" id="otp-form">
    <input type="hidden" name="otp" id="otp-hidden">
    <div class="otp-inputs">
      <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
      <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
      <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
      <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
      <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
      <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
    </div>
    <button type="submit" class="btn-main">✅ Verify OTP</button>
  </form>

  <p class="resend">
    Didn't receive it? <a href="/login">Go back and register again</a>
  </p>
</div>

<script>
  const boxes = document.querySelectorAll('.otp-box');

  boxes.forEach((box, i) => {
    box.addEventListener('input', () => {
      if (box.value && i < boxes.length - 1) {
        boxes[i + 1].focus();
      }
    });
    box.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !box.value && i > 0) {
        boxes[i - 1].focus();
      }
    });
  });

  document.getElementById('otp-form').addEventListener('submit', () => {
    const otp = [...boxes].map(b => b.value).join('');
    document.getElementById('otp-hidden').value = otp;
  });
</script>
</body>
</html>
