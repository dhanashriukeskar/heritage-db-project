{% extends "base.html" %}
{% block content %}
<section class="page-header text-center">
  <div class="container">
    <h1><i class="fas fa-paint-brush me-3"></i>Architecture Styles</h1>
    <p>Architectural styles and dynasties of heritage sites</p>
  </div>
</section>
<section class="sites-section">
  <div class="container">
    <div class="row g-4">
      {% for arch in architectures %}
      <div class="col-md-4">
        <div class="detail-card">
          <h5 class="detail-subtitle">{{ arch[1] }}</h5>
          <div class="detail-tags mb-3">
            <span class="detail-tag">
              <i class="fas fa-crown me-1"></i>{{ arch[2] }}
            </span>
          </div>
          <p class="detail-text">{{ arch[3] }}</p>
          <div class="location-item mt-3">
            <span>Site</span>
            <span style="color:#f0a500">{{ arch[5] }}</span>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
