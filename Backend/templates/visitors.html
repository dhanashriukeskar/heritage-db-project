{% extends "base.html" %}
{% block content %}
<section class="page-header text-center">
  <div class="container">
    <h1><i class="fas fa-users me-3"></i>Visitors</h1>
    <p>Registered visitors in the heritage database</p>
  </div>
</section>
<section class="sites-section">
  <div class="container">
    <div class="table-wrapper">
      <table class="heritage-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Phone</th>
          </tr>
        </thead>
        <tbody>
          {% for v in visitors %}
          <tr>
            <td>{{ v[0] }}</td>
            <td>{{ v[1] }}</td>
            <td>{{ v[2] }}</td>
            <td>{{ v[3] }}</td>
            <td>{{ v[4] }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</section>
{% endblock %}
